# \u26a1 âڑ،
console_title_template = '{{if .Root}} âڑ، {{end}}{{.Shell}} :: {{.UserName}} @ {{.HostName}}'
version = 2

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    template = 'â•­â”€'
    foreground = '#7a7a7a'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    leading_diamond = 'î‚¶'
    template = '{{ .Icon }} '
    foreground = '#458588'
    background = '#2f2f2f'
    type = 'os'
    style = 'diamond'

    [blocks.segments.options]
      alpine = 'ïŒ€'
      arch = 'ïŒƒ'
      centos = 'ïŒ„'
      debian = 'ïŒ†'
      elementary = 'ïŒ‰'
      fedora = 'ïŒٹ'
      gentoo = 'ïŒچ'
      linux = 'îœ’'
      macos = 'îœ‘'
      manjaro = 'ïŒ’'
      mint = 'ïŒڈ'
      opensuse = 'ïŒ”'
      raspbian = 'ïŒ•'
      ubuntu = 'ïŒœ'
      windows = 'îœڈ'

  [[blocks.segments]]
    template = ' ïƒ§<#7a7a7a> î‚±</>'
    foreground = '#ffff66'
    background = '#2f2f2f'
    type = 'root'
    style = 'diamond'

  [[blocks.segments]]
    template = ' {{ .Path }} '
    foreground = '#282828'
    powerline_symbol = 'î‚´'
    background = '#458588'
    type = 'path'
    style = 'powerline'

    [blocks.segments.options]
      style = 'full'

  [[blocks.segments]]
    template = '<#7a7a7a>î‚± </>{{ .UpstreamIcon }}{{ .HEAD }}{{ .BranchStatus }}{{ if .Working.Changed }}<#E84855> ïپ„ {{ .Working.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#2FDA4E> ïپ† {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} ïڑ’ {{ .StashCount }}{{ end }} '
    foreground = '#ffeb3b'
    background = '#2f2f2f'
    type = 'git'
    style = 'diamond'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb3b{{ end }}', '{{ if gt .Ahead 0 }}#2EC4B6{{ end }}', '{{ if gt .Behind 0 }}#8A4FFF{{ end }}']

    [blocks.segments.options]
      fetch_stash_count = true
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    trailing_diamond = 'î‚´'
    foreground = '#fafafa'
    background = '#2f2f2f'
    type = 'text'
    style = 'diamond'

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    template = ' â‌® '
    foreground = '#7a7a7a'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    template = ' {{ .FormattedMs }}<#fafafa> ï‰’ </>'
    foreground = '#FFCE5C'
    type = 'executiontime'
    style = 'plain'

    [blocks.segments.options]
      style = 'roundrock'
      threshold = 500.0

  [[blocks.segments]]
    template = ' ïœ… {{ if gt .Code 0 }}{{ .Code }}{{ end }} '
    foreground = '#9FD356'
    type = 'exit'
    style = 'plain'
    foreground_templates = ['{{ if gt .Code 0 }}#E84855{{ end }}']

    [blocks.segments.options]
      always_enabled = true

  [[blocks.segments]]
    leading_diamond = 'î‚²'
    foreground = '#fafafa'
    background = '#2f2f2f'
    type = 'text'
    style = 'diamond'

  [[blocks.segments]]
    template = ' îœک {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}<#7a7a7a> î‚³</>'
    foreground = '#6CA35E'
    background = '#2f2f2f'
    type = 'node'
    style = 'diamond'

  [[blocks.segments]]
    template = ' îˆµ {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}<#7a7a7a> î‚³</>'
    foreground = '#96E072'
    background = '#2f2f2f'
    type = 'python'
    style = 'diamond'

  [[blocks.segments]]
    template = ' î‌؟ {{ if .Unsupported }}ïپ±{{ else }}{{ .Full }}{{ end }}<#7a7a7a> î‚³</>'
    foreground = '#3891A6'
    background = '#2f2f2f'
    type = 'dotnet'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'î‚¶'
    trailing_diamond = 'î‚´'
    template = '{{ .CurrentDate | date .Format }}'
    foreground = '#26C6DA'
    background = '#2f2f2f'
    type = 'time'
    style = 'diamond'

    [blocks.segments.options]
      time_format = '15:04:05'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'â•°â”€ '
    foreground = '#7a7a7a'
    type = 'text'
    style = 'plain'

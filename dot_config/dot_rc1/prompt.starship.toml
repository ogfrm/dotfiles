format = """
$shell\
$env_var\
$time\
[Óāį ](fg:#33658A)\
[Óā∂](#9A348E)\
$username\
[Óāį](bg:#DA627D fg:#9A348E)\
$directory\
[Óāį](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[Óāį](fg:#FCA17D bg:#86BBD8)\
$nodejs\
$rust\
[Óāį](fg:#86BBD8 bg:#33658A)\
$time\
[Óāį ](fg:#33658A)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ÔĄ† to save some space
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "Ôúė "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ÔúėÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important Ôúė " = " ÔúėÔĄ™ "

[git_branch]
symbol = "Ôźė"
style = "bg:#FCA17D"
format = '[[ $symbol $branch ](bg:#FCA17D)]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[[($all_status$ahead_behind )](bg:#FCA17D)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#86BBD8"
format = '[[ $symbol ($version) ](bg:#86BBD8)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#86BBD8"
format = '[[ $symbol ($version) ](bg:#86BBD8)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[[ ‚ô• $time ](bg:#33658A)]($style)'


# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](bold white) '
style = "bg:#FCA17D"
variable = "STARSHIP_DISTRO"
disabled = false

[shell]
fish_indicator = "ÔúĻ"
powershell_indicator = "ÔĎ†_"
unknown_indicator = "mystery shell"
style = "bg:#FCA17D"
#style = "cyan bold"
disabled = false

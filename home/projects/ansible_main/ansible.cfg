[defaults]
action_plugins = ./action_plugins
inventory = inventory
# private_key_file = ~/.ssh/id_ed25519
vault_password_file = ~/.ssh/.ansible_key
display_skipped_hosts = false
interpreter_python = /usr/bin/python3
host_key_checking = false
    #to disable first time ssh key checking host key No RSA fingerprints
gathering = explicit
    #explicit (not gather), smart (1 time for host), implicit (default, facts will be gathered per play)

[ssh_connections]
pipelining = true

# [ssh_connection]
# ssh_args            = -F /dev/null -o ControlMaster=auto -o ControlPersist=60s
# transfer_method     = scp
# scp_extra_args      = -O
# scp_if_ssh          = True

# -O argument is used for OpenSSH versions 9.0 and above
# scp_if_ssh: A legacy option that determines whether to use the SCP method if SSH is used for file transfers instead of SFTP.
# ssh_args: In this case, it sets the -F option to /dev/null, which means Ansible will use an empty SSH configuration file. The -o options set ControlMaster=auto and ControlPersist=60s, which enable SSH connection sharing and persistence for improved performance. transfer_method: Specifies the method Ansible should use for transferring files to remote hosts. In this example, it’s set to scp, which uses the Secure Copy Protocol for file transfers. The default value is smart which uses preferred SFTP protocol and fallback to SCP.
# [ssh_connection]
# ssh_args = -o ControlMaster=auto -o ControlPersist=60s
# ; scp_if_ssh: true
# ; scp_extra_args: "-O"
# ControlMaster allows multiple simultaneous SSH sessions with a remote host to use a single network connection. This saves time on an SSH connection's initial processes because later SSH sessions use the first SSH connection for task execution.
# ControlPersist indicates how long the SSH keeps an idle connection open in the background. For example, ControlPersist=60s keeps the connection idle for 60 seconds:

# Privilege Escalation: The become settings allow you to specify whether Ansible should use privilege escalation and the method to use.
# [privilege_escalation]
# become = True
# become_method = sudo
# become_user = root

# [paramiko_connection] This section configures settings specific to Paramiko, an alternative to SSH.
# pipelining = True


---
- name: Local | Set Initial Vars
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Local | set __p_starttime # noqa: run-once[task]
      ansible.builtin.set_fact:
        __p_starttime: "{{ now(utc=false, fmt='%Y%m%dT%H%M%S') }}"
      delegate_to: localhost
      run_once: true
      tags: always


- name: Last Tasks
  hosts: all
  gather_facts: false
  tasks:
    - name: Changes Made
      ansible.builtin.debug:
        msg: "{{ __l_changed_tasks | d([]) | to_nice_yaml }}"
      when: __l_changed_tasks | d([]) | length > 0
      tags: always

# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

transient_prompt:
    template: ' {{ .Shell }} > '
    # background: '#2f2f2f'
    background: 'transparent'
    # foreground: '#7a7a7a'
    foreground_templates:
      - '{{if gt .Code 0}}red{{end}}'
      - '{{if eq .Code 0}}#7a7a7a{{end}}'
secondary_prompt:
  foreground: '#7a7a7a'
  # background: 'transparent'
  background: '#2f2f2f'
  template: " {{.Shell}} ÔØ»ÔØ» "
upgrade:
    source: cdn
    interval: 168h
    auto: false
    notice: false
console_title_template: '{{if .Root}}root :: {{end}}{{.Shell}} :: {{.Folder}}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - options:
            alpine: ´îÇ
            arch: ´îâ
            centos: ´îä
            debian: ´îå
            elementary: ´îë
            fedora: ´îè
            gentoo: ´îì
            linux: ¯£Æ
            macos: ¯£æ
            manjaro: ´îÆ
            mint: ´îÅ
            opensuse: ´îö
            raspbian: ´îò
            ubuntu: ´î£
            windows: ¯£Å
          # leading_diamond: ¯âçÔûô
          leading_diamond: ''
          # template: ' {{ if .WSL }}wsl {{ end }}{{ .Icon }}<#7a7a7a> ></>'
          template: ' {{ if .WSL }}wsl {{ end }}<#7a7a7a> ></>'
          # template: ' {{ if .WSL }}¯£Æ on {{ end }}{{ .Icon }}<#7a7a7a> ></>'
          foreground: '#26C6DA'
          background: '#2f2f2f'
          type: os
          style: diamond
    - type: prompt
      alignment: right
      segments:
        - leading_diamond: ¯é▓
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: text
          style: diamond
        - template: ' ¯£ÿ {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}<#7a7a7a> ¯é│</>'
          foreground: '#6CA35E'
          background: '#2f2f2f'
          type: node
          style: diamond
        - template: ' ¯êÁ {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}<#7a7a7a> ¯é│</>'
          foreground: '#96E072'
          background: '#2f2f2f'
          type: python
          style: diamond
        - template: ' ¯Ø┐ {{ if .Unsupported }}´ü▒{{ else }}{{ .Full }}{{ end }}<#7a7a7a> ¯é│</>'
          foreground: '#3891A6'
          background: '#2f2f2f'
          type: dotnet
          style: diamond
        - template: ' <#2EEFBF>{{ .HostName }}</><#7a7a7a> ></>'
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: session
          style: diamond

        - options:
        # https://ohmyposh.dev/docs/segments/system/executiontime
            style: round # roundrock
            threshold: 1000 # 5000
          template: ' {{ .FormattedMs }}</>'
          foreground: '#FFCE5C'
          type: executiontime
          style: plain
        - options:
            always_enabled: true
          template: ' ¯¬ƒ {{ if gt .Code 0 }}{{ .Code }}{{ end }} '
          foreground: '#9FD356'
          type: status
          style: plain
          foreground_templates:
            - '{{ if gt .Code 0 }}#E84855{{ end }}'


    - type: prompt
      alignment: left
      segments:
        - options:
            mapped_shell_names:
                bash: '#_'
                pwsh: ¯Üâ
                zsh: '%_'
          leading_diamond: '  '
          # leading_diamond: ¯âçÔûô
          foreground: '#26C6DA'
          background: '#2f2f2f'
          type: shell
          style: diamond
        - template: '  ÔØ»'
          # foreground: '#7a7a7a'
          foreground_templates:
            - '{{if gt .Code 0}}red{{end}}'
            # - '{{if eq .Code 0}}#7a7a7a{{end}}'
            - '{{if eq .Code 0}}#26C6DA{{end}}'
          background: '#2f2f2f'
          type: text
          style: plain
      newline: true
version: 4
final_space: true

# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

transient_prompt:
    template: ' {{ .Shell }} > '
    # background: '#2f2f2f'
    background: 'transparent'
    # foreground: '#7a7a7a'
    foreground_templates:
      - '{{if gt .Code 0}}red{{end}}'
      - '{{if eq .Code 0}}#7a7a7a{{end}}'
secondary_prompt:
  foreground: '#7a7a7a'
  # background: 'transparent'
  background: '#2f2f2f'
  template: " {{.Shell}} ❯❯ "
upgrade:
    source: cdn
    interval: 168h
    auto: false
    notice: false
console_title_template: '{{if .Root}}root :: {{end}}{{.Shell}} :: {{.Folder}}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - template: '  >'
          # foreground: '#7a7a7a'
          # background: '#2f2f2f'
          type: text
          style: plain

    - type: prompt
      newline: true
      alignment: left
      segments:
        - template: '  ❯'
          # foreground: '#7a7a7a'
          foreground_templates:
            - '{{if gt .Code 0}}red{{end}}'
            # - '{{if eq .Code 0}}#7a7a7a{{end}}'
            - '{{if eq .Code 0}}#26C6DA{{end}}'
          background: '#2f2f2f'
          type: text
          style: plain
version: 4
final_space: true

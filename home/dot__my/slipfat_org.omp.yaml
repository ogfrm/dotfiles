# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

transient_prompt:
    template: ' ~#@❯ '
    foreground: '#7a7a7a'
    background: transparent
upgrade:
    source: cdn
    interval: 168h
    auto: false
    notice: false
console_title_template: '{{if .Root}}root :: {{end}}{{.Shell}} :: {{.Folder}}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - options:
            alpine: 
            arch: 
            centos: 
            debian: 
            elementary: 
            fedora: 
            gentoo: 
            linux: 
            macos: 
            manjaro: 
            mint: 
            opensuse: 
            raspbian: 
            ubuntu: 
            windows: 
          leading_diamond: ▓
          template: ' {{ if .WSL }} on {{ end }}{{ .Icon }}<#7a7a7a> </>'
          foreground: '#26C6DA'
          background: '#2f2f2f'
          type: os
          style: diamond
        - template: ' {{ if ne .Env.POSH_SESSION_DEFAULT_USER .UserName }}<#77f5d6>{{ .UserName }}</><#7a7a7a></>{{ end }}<#2EEFBF>{{ .HostName }}</><#7a7a7a> </>'
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: session
          style: diamond
        - template: ' <#7a7a7a> </>'
          foreground: '#ffff66'
          background: '#2f2f2f'
          type: root
          style: diamond
        - options:
            folder_icon: <#B5B2C2> </>
            style: full
          template: '<#f2f200>  </>{{ .Path }} '
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: path
          style: diamond
        - options:
            fetch_status: true
            fetch_upstream_icon: true
          template: '<#7a7a7a> </>{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}<#E84855>  {{ .Working.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#2FDA4E>  {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
          foreground: '#ffeb3b'
          background: '#2f2f2f'
          type: git
          style: diamond
          foreground_templates:
            - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb3b{{ end }}'
            - '{{ if gt .Ahead 0 }}#2EC4B6{{ end }}'
            - '{{ if gt .Behind 0 }}#8A4FFF{{ end }}'
        - trailing_diamond: 
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: text
          style: diamond
    - type: prompt
      alignment: right
      segments:
        - leading_diamond: 
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: text
          style: diamond
        - template: '  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}<#7a7a7a> </>'
          foreground: '#6CA35E'
          background: '#2f2f2f'
          type: node
          style: diamond
        - template: '  {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}<#7a7a7a> </>'
          foreground: '#96E072'
          background: '#2f2f2f'
          type: python
          style: diamond
        - template: '  {{ if .Unsupported }}{{ else }}{{ .Full }}{{ end }}<#7a7a7a> </>'
          foreground: '#3891A6'
          background: '#2f2f2f'
          type: dotnet
          style: diamond
        - options:
            time_format: "15:04:05"
          trailing_diamond: ▓
          template: ' {{ .CurrentDate | date .Format }}<#007ACC>  </>'
          foreground: '#fafafa'
          background: '#2f2f2f'
          type: time
          style: diamond
    - type: prompt
      alignment: left
      segments:
        - template: ' ~#@❯ '
          foreground: '#7a7a7a'
          type: text
          style: plain
      newline: true
    - type: rprompt
      alignment: right
      segments:
        - template: ' ❮ '
          foreground: '#7a7a7a'
          type: text
          style: plain
        - options:
            style: roundrock
            threshold: 500
          template: ' {{ .FormattedMs }}<#fafafa>  </>'
          foreground: '#FFCE5C'
          type: executiontime
          style: plain
        - options:
            always_enabled: true
          template: '  {{ if gt .Code 0 }}{{ .Code }}{{ end }} '
          foreground: '#9FD356'
          type: status
          style: plain
          foreground_templates:
            - '{{ if gt .Code 0 }}#E84855{{ end }}'
version: 4
final_space: true

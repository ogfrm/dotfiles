# https://tmuxcheatsheet.com/
# /etc/tmux.conf -> $HOME/.tmux.conf -> $XDG_CONFIG_HOME/tmux/tmux.conf -> $HOME/.config/tmux/tmux.conf

# if you want to bypass Prefix use -n like   bind -n C-j choose-window 'join-pane -h -s "%%"'
# unbind-key=unbind set-option=set set-window-option=setw
# **Initial setup
set -g default-terminal "tmux-256color"
# set -g default-terminal xterm-256color
set -ag terminal-overrides ",xterm-256color:RGB"  # if tmux-256color not supported use this
# set -sa terminal-overrides ',xterm-256color:RGB'

# set -g status-keys vi   # default emacs  Use vi or emacs-style key bindings in the status line
# setw -g mode-keys vi  # Configures keybindings for copy mode

# set -gq allow-passthrough on

set -g mouse on     # Mouse Mode (You can resize or select windows )
# set -g mouse-select-pane off
# set -g mouse-resize-pane off
# set -g mouse-select-window off

set -g history-limit 5000  # increase history lines D(2000)

# # Lengthen the amount of time status messages are displayed
# set -g display-time 3000
# set -g display-panes-time 3000

# Automatically set window title
setw -g automatic-rename on
set -g set-titles on

# Set the base-index to 1 rather than 0  for windows and panels
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on  # when window deleted renumber windows

# set -g repeat-time 0      # Allow the arrow key to be used immediately after changing windows.
# set -sg escape-time 0     # No delay for escape key press
# set -sg escape-time 10  # set this if you see escape char when you start from windows

# set -g message-style bg=colour237,fg=colour231
# set -g pane-border-style fg=colour36
# set -g pane-active-border-style fg=colour35

# # If you use the terminal a lot, the beeps and bells that are made whenever you make a mistake are VERY annoying. If you want to disable these annoyances
# set -g visual-bell off
# set -g visual-silence off
# set -g bell-action none

# set-option -g default-shell '/bin/zsh'

# * BINDINGS
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# PREFIX D(b)  popular   C-a C-space C-s C-u `  Tab+Key  C-z  (1=C-f 2=C-j)     A+m
unbind C-b
# unbind C-s
set -g prefix C-s
bind C-s send-prefix

# h to open any file new pane
# bind h split-window -h "vim ~/scratch/notes.md"

# # Synchronize panes  any input typed into one pane is mirrored across all other panes in the window.
# bind y setw synchronize-panes\; display-message "synchronize mode toggled."
bind-key C-j setw synchronize-panes on
bind-key C-k setw synchronize-panes off

# bind L clear-history     # # Easy clear history

# unbind p
# bind p paste-buffer
# bind -T copy-mode-vi 'v' send -X begin-selection
# bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel

## ** PANES Set easier window split keys
# unbind %
# unbind '"'
bind -n C-x killp # ^ + `x to kill panel
# ^+ ➡️⬅️ to create a new horizontal pane     P+_,- |,\   P+"v","h"
# bind -n C-Right split-window -h -c "#{pane_current_path}"
bind -n C-Right split-window -h -c "#{pane_current_path}"
bind -n C-Left split-window -fh -c "#{pane_current_path}"   # full height
bind = split-window -h
# bind "|" split-window -h -c "#{pane_current_path}"
# bind "\\" split-window -fh -c "#{pane_current_path}"   # full height
# ^+ ⬆️,⬇️ to create a new vertical pane
bind -n C-Down split-window -v -c "#{pane_current_path}"
bind -n C-Up split-window -fv -c "#{pane_current_path}"   # ful width
bind - split-window -v
# bind "-" split-window -v -c "#{pane_current_path}"
# bind "_" split-window -fv -c "#{pane_current_path}"     # full width

# Alt + (⬆️➡️⬇️⬅️) to move between the panels without prefix key to switch panes
#### OR Vim-Inspired Pane Navigation** Replace arrow keys with `h(L)j(D)k(U)l(R)` for pane navigation:
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# commands to resize the panes alternatives are the arrow keys, Ctrl + arrow keys, or </>/-/+
# bind -r C-j resize-pane -D 15
# bind -r C-k resize-pane -U 15
# bind -r C-h resize-pane -L 15
# bind -r C-l resize-pane -R 15

bind -r m resize-pane -Z # maximize panes

## ** WINDOWS
# keep same path at new windows
bind c new-window -c "#{pane_current_path}"

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window
# switch between last and current window  Use same key as prefix con convinience
bind s last-window
# bind-key -n M-l select-window -l
# bind-key -n M-Left select-window -p
# bind-key -n M-Right select-window -n
# bind-key -n PPage  select-window -p
# bind-key -n NPage  select-window -n

bind-key -r i run-shell "tmux neww ~/.config/tmux/tmux-cht.sh"

### **Easily reorder windows with CTRL+SHIFT+Arrow
# bind -n C-S-Left swap-window -t -1
# bind -n C-S-Right swap-window -t +1
# bind -r "<" swap-window -d -t -1  # -d the new window does not become the current window
# bind -r ">" swap-window -d -t +1  # -r flag indicates this key may repeat

## ** Sessions
# toggle between the current and the previous session
bind C-a switch-client -l
bind-key n command-prompt "new-session -s '%%'"  # new session with name

# Instant switch to a new tmux session selecting directory that exist
bind-key -r f run-shell "tmux neww $HOME/.config/tmux/tmux-sessionizer.sh"


# **  Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'    # plugin introduces a set of standardized settings

set -g @plugin 'jaclu/tmux-menus'  # Press P + \ to get a menu to do all sorts of TMUX options
set -g @plugin 'tmux-plugins/tmux-sidebar'

# set -g @plugin 'aaronpowell/tmux-weather'  # Adds weather information into the status bar
# set -g @plugin 'noscript/tmux-mighty-scroll'  # scroll support with mouse (tmux already does it ?)
# set -g @plugin 'b0o/tmux-autoreload'  # require entr  reloads conf file it changes
# set -g @plugin 'tmux-plugins/tmux-sidebar'  # P+Tab sidebar pane, treeview recursively,cannot be interacted with
# set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'
# set -g @plugin 'sainnhe/tmux-fzf'
# set -agF status-right "#{E:prefix_highlight}"

# # https://ostechnix.com/save-and-restore-tmux-environment/
set -g @plugin 'tmux-plugins/tmux-resurrect' # Resurrect will restore your session state if your computer is reset
# P+C+s Save P+C+r reload
# set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum' # Continuum will automatically save you session state
set -g @continuum-restore 'on'  # Last saved environment is automatically restored when tmux is started
set -g @continuum-save-interval '5'  # save every minute D(15)
set -g @continuum-boot 'on'  # Automatic Tmux start
# set -g status-right 'Continuum status: #{continuum_status}'  # to show the intercval status bar


# ** Statusbar
set -g status-position top  # D(bottom)
set -g status on
set -g status-interval 5  #60 Update the status line every interval seconds. D(15)
bind -n DoubleClick1StatusLeft choose-tree -Zs
bind -n DoubleClick1StatusRight choose-tree -Zs

setw -g monitor-activity on # # Change background color of a tab when activity occurs
setw -g monitor-silence 0 # Do NOT reset the color of the tab after activity stops occuring
setw -g monitor-bell off  # Disable bell

# Display short visual text box when activity occurs  # LLTVOld on
set -g visual-activity on
# bind -n MouseDown1StatusLeft choose-tree -Zs

# https://github.com/omerxx/catppuccin-tmux
# set -g @plugin 'tmux-plugins/tmux-cpu'  # https://github.com/tmux-plugins/tmux-cpu
# set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} | %a %h-%d %H:%M '
# set -g @plugin 'tmux-plugins/tmux-battery' # https://github.com/tmux-plugins/tmux-battery
# set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '

set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate  Session select
set -g @sessionx-bind 'o'  # change key O->o
set -g @plugin 'omerxx/tmux-floax'  # P+p floating session



# Configure Online status
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @online_icon "ok"
set -g @offline_icon "nok"


# source-file $HOME/.config/tmux/tmux_status.conf
# source-file $HOME/.config/tmux/tmux_status4.conf
source-file $HOME/.config/tmux/tmux_catppuccin0.conf

# ** PREFIX+I reload Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/.tmux/plugins/tpm
# run '~/.tmux/plugins/tpm/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
